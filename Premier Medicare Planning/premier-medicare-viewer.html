<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Premier Medicare Planning — HTML Mockup Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; }

.viewer { display: flex; flex-direction: column; height: 100vh; }

.viewer-header { flex-shrink: 0; background: #1a1a1a; border-bottom: 1px solid #333; padding: 16px 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
.viewer-title { color: #fff; font-size: 16px; font-weight: 700; }
.viewer-subtitle { color: #888; font-size: 13px; margin-top: 2px; }
.changes-badge { font-size: 12px; font-weight: 600; color: #b07d2e; background: #fdf3dc; border: 1px solid #f0d88a; border-radius: 20px; padding: 5px 14px; white-space: nowrap; }

.browser-bar { flex-shrink: 0; display: flex; align-items: center; gap: 12px; padding: 10px 16px; background: #2a2a2a; }
.browser-dots { display: flex; gap: 6px; flex-shrink: 0; }
.dot { width: 11px; height: 11px; border-radius: 50%; display: inline-block; }
.dot.red { background: #ff5f57; }
.dot.yellow { background: #febc2e; }
.dot.green { background: #28c840; }
.browser-address { flex: 1; min-width: 0; background: #3a3a3a; color: #ccc; font-family: monospace; font-size: 13px; padding: 5px 12px; border-radius: 6px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.browser-tag { font-size: 10px; font-weight: 700; letter-spacing: 0.08em; color: #6a9fff; white-space: nowrap; flex-shrink: 0; }

.page-tabs-wrap { flex-shrink: 0; background: #1e1e1e; padding: 12px 16px; border-bottom: 1px solid #333; }
.tabs-hint { display: block; font-size: 11px; color: #666; margin-bottom: 8px; letter-spacing: 0.03em; }
.page-tabs { display: flex; overflow-x: auto; gap: 6px; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
.page-tabs::-webkit-scrollbar { display: none; }
.page-tab { flex-shrink: 0; padding: 7px 14px; background: #2e2e2e; border: 1px solid #444; border-radius: 6px; color: #aaa; font-size: 12px; font-family: monospace; cursor: pointer; white-space: nowrap; transition: background 0.15s, border-color 0.15s, color 0.15s; }
.page-tab::before { content: '📄'; font-size: 11px; display: inline-block; width: 18px; text-align: center; margin-right: 4px; }
.page-tab.active::before { content: '✦'; }
.page-tab:hover { background: #3a3a3a; border-color: #00D692; color: #fff; }
.page-tab.active { background: #00D692; border-color: #00D692; color: #111; font-weight: 700; }

.page-dropdown-wrap { flex-shrink: 0; display: none; align-items: center; gap: 10px; padding: 10px 16px; background: #1e1e1e; border-bottom: 1px solid #333; }
.dropdown-label { font-size: 12px; color: #888; white-space: nowrap; font-family: monospace; }
.page-dropdown { flex: 1; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: monospace; cursor: pointer; }

@media (max-width: 680px) {
  .page-tabs-wrap { display: none; }
  .page-dropdown-wrap { display: flex; }
}

/* iframe fills all remaining space */
.iframe-wrapper { flex: 1; overflow: hidden; background: #fff; min-height: 0; }
#mockup-iframe { display: block; border: none; width: 100%; height: 100%; }

.viewer-footer { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding: 14px 24px; background: #1a1a1a; border-top: 1px solid #333; }
.footer-note { font-size: 13px; color: #666; }
.live-btn { display: inline-block; background: #00D692; color: #111; font-weight: 700; font-size: 14px; padding: 11px 24px; border-radius: 8px; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
.live-btn:hover { background: #00c082; }
</style>
</head>
<body>

<div class="viewer">

  <div class="viewer-header">
    <div>
      <div class="viewer-title">Premier Medicare Planning</div>
      <div class="viewer-subtitle">Client-provided HTML mockup · 7 pages</div>
    </div>
    <span class="changes-badge">✦ Refined per client feedback</span>
  </div>

  <div class="browser-bar">
    <div class="browser-dots">
      <span class="dot red"></span>
      <span class="dot yellow"></span>
      <span class="dot green"></span>
    </div>
    <div class="browser-address" id="address-bar">home.html</div>
    <div class="browser-tag">HTML MOCKUP</div>
  </div>

  <div class="page-tabs-wrap">
    <span class="tabs-hint">🗂 Click a page to preview:</span>
    <div class="page-tabs">
      <button class="page-tab active" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/home.html', 'home.html', this)">home.html</button>
      <button class="page-tab" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/Contact.html', 'Contact.html', this)">Contact.html</button>
      <button class="page-tab" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/Medicare-Advantage.html', 'Medicare-Advantage.html', this)">Medicare-Advantage.html</button>
      <button class="page-tab" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/Medicare-Supplement-Plans.html', 'Medicare-Supplement-Plans.html', this)">Medicare-Supplement-Plans.html</button>
      <button class="page-tab" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/Part-D-Drug-Plans.html', 'Part-D-Drug-Plans.html', this)">Part-D-Drug-Plans.html</button>
      <button class="page-tab" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/Turning-65.html', 'Turning-65.html', this)">Turning-65.html</button>
      <button class="page-tab" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/Why-Us.html', 'Why-Us.html', this)">Why-Us.html</button>
    </div>
  </div>

  <div class="page-dropdown-wrap">
    <span class="dropdown-label">📄 Page:</span>
    <select class="page-dropdown" onchange="switchPageMobile(this)">
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/home.html" data-name="home.html">home.html</option>
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/Contact.html" data-name="Contact.html">Contact.html</option>
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/Medicare-Advantage.html" data-name="Medicare-Advantage.html">Medicare-Advantage.html</option>
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/Medicare-Supplement-Plans.html" data-name="Medicare-Supplement-Plans.html">Medicare-Supplement-Plans.html</option>
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/Part-D-Drug-Plans.html" data-name="Part-D-Drug-Plans.html">Part-D-Drug-Plans.html</option>
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/Turning-65.html" data-name="Turning-65.html">Turning-65.html</option>
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/Why-Us.html" data-name="Why-Us.html">Why-Us.html</option>
    </select>
  </div>

  <div class="iframe-wrapper">
    <iframe id="mockup-iframe" src="https://kalanaheshanwa.github.io/client-mockups-projects/Premier%20Medicare%20Planning/home.html"></iframe>
  </div>

  <div class="viewer-footer">
    <span class="footer-note">📄 Original HTML files provided by client — built into Squarespace</span>
    <a href="https://www.premiermedicareplanning.com/" target="_blank" class="live-btn">View Live Website →</a>
  </div>

</div>

<script>
function switchPage(url, filename, btn) {
  document.getElementById('mockup-iframe').src = url;
  document.getElementById('address-bar').textContent = filename;
  btn.closest('.page-tabs').querySelectorAll('.page-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function switchPageMobile(select) {
  const url = select.value;
  const filename = select.options[select.selectedIndex].getAttribute('data-name');
  document.getElementById('mockup-iframe').src = url;
  document.getElementById('address-bar').textContent = filename;
}
</script>
</body>
</html>
