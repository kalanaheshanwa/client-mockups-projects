<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Muse MSC — HTML Mockup Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; }
.viewer { display: flex; flex-direction: column; height: 100vh; }
.page-tabs-wrap { flex-shrink: 0; background: #1e1e1e; padding: 12px 16px; border-bottom: 1px solid #333; }
.tabs-hint { display: block; font-size: 11px; color: #666; margin-bottom: 8px; letter-spacing: 0.03em; }
.page-tabs { display: flex; overflow-x: auto; gap: 6px; scrollbar-width: none; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
.page-tabs::-webkit-scrollbar { display: none; }
.page-tab { flex-shrink: 0; padding: 7px 14px; background: #2e2e2e; border: 1px solid #444; border-radius: 6px; color: #aaa; font-size: 12px; font-family: monospace; cursor: pointer; white-space: nowrap; transition: background 0.15s, border-color 0.15s, color 0.15s; }
.page-tab::before { content: '📄'; font-size: 11px; display: inline-block; width: 18px; text-align: center; margin-right: 4px; }
.page-tab.active::before { content: '✦'; }
.page-tab:hover { background: #3a3a3a; border-color: #00D692; color: #fff; }
.page-tab.active { background: #00D692; border-color: #00D692; color: #111; font-weight: 700; }
.page-dropdown-wrap { flex-shrink: 0; display: none; align-items: center; gap: 10px; padding: 10px 16px; background: #1e1e1e; border-bottom: 1px solid #333; }
.dropdown-label { font-size: 12px; color: #888; white-space: nowrap; font-family: monospace; }
.page-dropdown { flex: 1; background: #2a2a2a; color: #fff; border: 1px solid #444; border-radius: 6px; padding: 8px 10px; font-size: 13px; font-family: monospace; cursor: pointer; }
@media (max-width: 680px) { .page-tabs-wrap { display: none; } .page-dropdown-wrap { display: flex; } }
.iframe-wrapper { flex: 1; overflow: hidden; background: #fff; min-height: 0; }
#mockup-iframe { display: block; border: none; width: 100%; height: 100%; }
.viewer-footer { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding: 14px 24px; background: #1a1a1a; border-top: 1px solid #333; }
.footer-note { font-size: 13px; color: #666; }
.live-btn { display: inline-block; background: #00D692; color: #111; font-weight: 700; font-size: 14px; padding: 11px 24px; border-radius: 8px; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
.live-btn:hover { background: #00c082; }
</style>
</head>
<body>
<div class="viewer">

  <div class="page-tabs-wrap">
    <span class="tabs-hint">🗂 Click a page to preview:</span>
    <div class="page-tabs">
      <button class="page-tab active" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/home.html', 'home.html', this)">home.html</button>
      <button class="page-tab" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/Clinical-Evidence.html', 'Clinical-Evidence.html', this)">Clinical-Evidence.html</button>
      <button class="page-tab" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/Contact-Us.html', 'Contact-Us.html', this)">Contact-Us.html</button>
      <button class="page-tab" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/Mechanism-of-Action.html', 'Mechanism-of-Action.html', this)">Mechanism-of-Action.html</button>
      <button class="page-tab" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/Publications-Overview.html', 'Publications-Overview.html', this)">Publications-Overview.html</button>
      <button class="page-tab" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/The-Science.html', 'The-Science.html', this)">The-Science.html</button>
      <button class="page-tab" onclick="switchPage('https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/Webinar-Registration.html', 'Webinar-Registration.html', this)">Webinar-Registration.html</button>
    </div>
  </div>

  <div class="page-dropdown-wrap">
    <span class="dropdown-label">📄 Page:</span>
    <select class="page-dropdown" onchange="switchPageMobile(this)">
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/home.html" data-name="home.html">home.html</option>
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/Clinical-Evidence.html" data-name="Clinical-Evidence.html">Clinical-Evidence.html</option>
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/Contact-Us.html" data-name="Contact-Us.html">Contact-Us.html</option>
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/Mechanism-of-Action.html" data-name="Mechanism-of-Action.html">Mechanism-of-Action.html</option>
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/Publications-Overview.html" data-name="Publications-Overview.html">Publications-Overview.html</option>
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/The-Science.html" data-name="The-Science.html">The-Science.html</option>
      <option value="https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/Webinar-Registration.html" data-name="Webinar-Registration.html">Webinar-Registration.html</option>
    </select>
  </div>

  <div class="iframe-wrapper">
    <iframe id="mockup-iframe" src="https://kalanaheshanwa.github.io/client-mockups-projects/muse-msc/home.html"></iframe>
  </div>

  <div class="viewer-footer">
    <span class="footer-note">📄 Original HTML files provided by client — built into Squarespace</span>
    <a href="https://www.musemsc.com/" target="_blank" class="live-btn">View Live Website →</a>
  </div>

</div>
<script>
function switchPage(url, filename, btn) {
  document.getElementById('mockup-iframe').src = url;
  btn.closest('.page-tabs').querySelectorAll('.page-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}
function switchPageMobile(select) {
  document.getElementById('mockup-iframe').src = select.value;
}
</script>
</body>
</html>
