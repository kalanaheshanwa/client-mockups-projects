<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Resurface Co. — Mockup Viewer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #111; }

.viewer { display: flex; flex-direction: column; height: 100vh; }

.story-bar { flex-shrink: 0; display: flex; align-items: center; justify-content: center; gap: 16px; padding: 14px 22px; background: #111; border-bottom: 1px solid #222; flex-wrap: wrap; }
.story-step { display: flex; align-items: center; gap: 8px; }
.story-icon { font-size: 18px; }
.story-text { font-size: 13px; color: #aaa; }
.story-text strong { color: #fff; }
.story-arrow { font-size: 20px; color: #00D692; font-weight: 700; }

.image-label { flex-shrink: 0; padding: 8px 16px; background: #2a2a2a; font-size: 10px; font-weight: 700; letter-spacing: 0.1em; color: #6a9fff; }

.mockup-image-wrap { flex: 1; overflow-y: auto; background: #f5f5f5; min-height: 0; }
.mockup-image { width: 100%; display: block; }

.viewer-footer { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; padding: 14px 24px; background: #1a1a1a; border-top: 1px solid #333; }
.footer-note { font-size: 13px; color: #666; }
.live-btn { display: inline-block; background: #00D692; color: #111; font-weight: 700; font-size: 14px; padding: 11px 24px; border-radius: 8px; text-decoration: none; transition: all 0.2s; white-space: nowrap; }
.live-btn:hover { background: #00c082; }
</style>
</head>
<body>
<div class="viewer">

  <div class="story-bar">
    <div class="story-step">
      <span class="story-icon">🖼</span>
      <span class="story-text">Client provided <strong>one homepage image</strong></span>
    </div>
    <div class="story-arrow">→</div>
    <div class="story-step">
      <span class="story-icon">✦</span>
      <span class="story-text">I built the <strong>full multi-page site</strong> in the same style</span>
    </div>
  </div>

  <div class="image-label">CLIENT'S ORIGINAL DESIGN</div>

  <div class="mockup-image-wrap">
    <img src="https://images.squarespace-cdn.com/content/69cdfa4b7e96fb29aceec739/e06f30f3-fedc-451b-9bf3-d351a575e046/6A217C59-1281-4789-A815-4B62E92EE6F5.png?content-type=image%2Fpng" alt="Resurface Co. client mockup" class="mockup-image" />
  </div>

  <div class="viewer-footer">
    <span class="footer-note">📄 Single image provided by client — full site built in Squarespace</span>
    <a href="https://www.resurface.co/" target="_blank" class="live-btn">View Live Website →</a>
  </div>

</div>
</body>
</html>
